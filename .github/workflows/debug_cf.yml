name: Cloudflare突破デバッグ（一時・診断用）

# ActionsのIPでana-sloのページが実際にどう返るかを診断する一時ワークフロー。
# 診断が終わったら削除する。

on:
  workflow_dispatch:

concurrency:
  group: ana-slo-scraping

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: HTTPステータス・ヘッダー確認 (curl)
        run: |
          URL="https://ana-slo.com/2026-07-11-yasuda7-data/"
          echo "=== 素のcurl ==="
          curl -sS -o /tmp/body1.txt -D /tmp/head1.txt -w 'status=%{http_code} size=%{size_download}\n' "$URL" || true
          cat /tmp/head1.txt
          head -c 300 /tmp/body1.txt; echo
          echo "=== ブラウザUA付きcurl ==="
          curl -sS -o /tmp/body2.txt -D /tmp/head2.txt -w 'status=%{http_code} size=%{size_download}\n' \
            -H 'User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36' \
            -H 'Accept: text/html,application/xhtml+xml' -H 'Accept-Language: ja,en;q=0.9' "$URL" || true
          cat /tmp/head2.txt
          head -c 300 /tmp/body2.txt; echo
          echo "=== トップページ(比較用) ==="
          curl -sS -o /tmp/body3.txt -D /tmp/head3.txt -w 'status=%{http_code} size=%{size_download}\n' \
            -H 'User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36' \
            "https://ana-slo.com/" || true
          cat /tmp/head3.txt
          head -c 300 /tmp/body3.txt; echo

      - name: 依存関係インストール
        run: pip install seleniumbase beautifulsoup4

      - name: 取得テスト（headless vs xvfb+reconnect）
        run: |
          cat > /tmp/debug_cf.py << 'EOF'
          from seleniumbase import SB
          from urllib.parse import quote
          import re

          URL = f"https://ana-slo.com/2026-07-11-{quote('yasuda7', safe='')}-data/"

          def report(label, html):
              m = re.search(r'<title[^>]*>(.*?)</title>', html, re.S)
              title = m.group(1).strip() if m else 'なし'
              has_section = ('id="section' in html) or ("id='section" in html)
              print(f"[{label}] len={len(html)} title={title}")
              print(f"[{label}] sectionあり={has_section}")
              print(f"[{label}] 先頭300字: {html[:300]!r}")

          # 案1: 現行実装と同じ headless + 即取得
          try:
              with SB(uc=True, headless=True) as sb:
                  sb.get(URL)
                  report('headless即時', sb.get_page_source())
          except Exception as e:
              print(f"[headless即時] 例外: {e}")

          # 案2: xvfb + uc_open_with_reconnect
          try:
              with SB(uc=True, xvfb=True) as sb:
                  sb.uc_open_with_reconnect(URL, reconnect_time=6)
                  report('xvfb+reconnect', sb.get_page_source())
          except Exception as e:
              print(f"[xvfb+reconnect] 例外: {e}")

          # 案3: xvfb + reconnect + CAPTCHAクリック
          try:
              with SB(uc=True, xvfb=True) as sb:
                  sb.uc_open_with_reconnect(URL, reconnect_time=6)
                  try:
                      sb.uc_gui_click_captcha()
                      sb.sleep(4)
                  except Exception as e2:
                      print(f"[xvfb+captcha] captchaクリック例外(続行): {e2}")
                  report('xvfb+captcha', sb.get_page_source())
          except Exception as e:
              print(f"[xvfb+captcha] 例外: {e}")
          EOF
          python3 /tmp/debug_cf.py

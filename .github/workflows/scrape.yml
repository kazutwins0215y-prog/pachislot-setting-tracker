name: Daily Scraping

# 2026-07: ana-slo.com(Cloudflare)がGitHub Actionsのデータセンター系IPを
# 即403ブロックすることが判明したため、自動実行(schedule)は停止中。
# 手動実行(workflow_dispatch)のみ残す(将来プロキシ等を検討する場合の検証用)。
on:
  workflow_dispatch: {}

# サイト負荷配慮: スクレイピング系ワークフローは同時に1つしか走らせない
concurrency:
  group: ana-slo-scraping

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 240  # これを超えたら強制的に失敗扱いにする(通常は2〜3時間程度で完了する想定)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r fase1/requirements.txt

      - name: Run scraper
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: python fase1/メイン.py
